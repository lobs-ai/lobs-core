# docker-compose.agents.yml — Run full lobs-core instances as standalone agents
#
# Each agent is a complete lobs-core with its own config, DB, and Discord bot.
# Repo clones and working files persist in the workspace volume.
#
# Usage:
#   docker compose -f docker-compose.agents.yml up -d
#   docker compose -f docker-compose.agents.yml logs -f briggs
#   docker compose -f docker-compose.agents.yml down
#
# Prerequisites:
#   - Create Discord bot applications and get tokens
#   - Put tokens in ~/.lobs-agents/{name}/config/secrets/discord-token.json
#   - Or set BRIGGS_DISCORD_TOKEN etc. in .env.agents

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile.agent
  restart: unless-stopped
  environment: &agent-env
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GH_TOKEN: ${GH_TOKEN:-}

services:
  briggs:
    <<: *agent-base
    container_name: lobs-agent-briggs
    environment:
      <<: *agent-env
      AGENT_NAME: briggs
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${BRIGGS_DISCORD_TOKEN:-}
    ports:
      - "9431:9421"
    volumes:
      - ${HOME}/.lobs-agents/briggs:/data
      - briggs-workspace:/home/agent

  sam:
    <<: *agent-base
    container_name: lobs-agent-sam
    environment:
      <<: *agent-env
      AGENT_NAME: sam
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${SAM_DISCORD_TOKEN:-}
    ports:
      - "9432:9421"
    volumes:
      - ${HOME}/.lobs-agents/sam:/data
      - sam-workspace:/home/agent

  lena:
    <<: *agent-base
    container_name: lobs-agent-lena
    environment:
      <<: *agent-env
      AGENT_NAME: lena
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${LENA_DISCORD_TOKEN:-}
    ports:
      - "9433:9421"
    volumes:
      - ${HOME}/.lobs-agents/lena:/data
      - lena-workspace:/home/agent

volumes:
  briggs-workspace:
  sam-workspace:
  lena-workspace:
