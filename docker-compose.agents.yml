# docker-compose.agents.yml — Auto-generated by scripts/generate-compose.sh
#
# Each agent is a full lobs-core instance with its own config, DB, and Discord bot.
#
# Usage:
#   docker compose -f docker-compose.agents.yml up -d
#   docker compose -f docker-compose.agents.yml logs -f <agent>
#   docker compose -f docker-compose.agents.yml down
#
# Regenerate after adding/removing agents:
#   ./scripts/generate-compose.sh

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile.agent
  restart: unless-stopped
  environment: &agent-env
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GH_TOKEN: ${GH_TOKEN:-}

services:
  briggs:
    <<: *agent-base
    container_name: lobs-agent-briggs
    environment:
      <<: *agent-env
      AGENT_NAME: briggs
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${BRIGGS_DISCORD_TOKEN:-}
    ports:
      - "9431:9421"
    volumes:
      - ${HOME}/.lobs-agents/briggs:/data
      - briggs-workspace:/home/agent

  lena:
    <<: *agent-base
    container_name: lobs-agent-lena
    environment:
      <<: *agent-env
      AGENT_NAME: lena
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${LENA_DISCORD_TOKEN:-}
    ports:
      - "9433:9421"
    volumes:
      - ${HOME}/.lobs-agents/lena:/data
      - lena-workspace:/home/agent

  sam:
    <<: *agent-base
    container_name: lobs-agent-sam
    environment:
      <<: *agent-env
      AGENT_NAME: sam
      LOBS_ROOT: /data
      LOBS_PORT: "9421"
      DISCORD_BOT_TOKEN: ${SAM_DISCORD_TOKEN:-}
    ports:
      - "9432:9421"
    volumes:
      - ${HOME}/.lobs-agents/sam:/data
      - sam-workspace:/home/agent

volumes:
  briggs-workspace:
  lena-workspace:
  sam-workspace:

